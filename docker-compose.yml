services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trade_sim
      POSTGRES_PASSWORD: trade_sim_local
      POSTGRES_DB: trade_sim
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trade_sim"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
