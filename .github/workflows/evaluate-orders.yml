name: Evaluate pending orders

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (conservative to stay within GitHub Actions free tier)
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Trigger order evaluation
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/evaluate-orders")
          echo "Response: $response"
          if [ "$response" != "200" ]; then
            echo "Cron failed with HTTP $response"
            exit 1
          fi
